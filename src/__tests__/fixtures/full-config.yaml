defaults:
  repo: kong/kongctl
  agent: codex
  environment: laptop
  base_branch: main
  worktree_root: ~/.local/share/worktrees

repos:
  kong/kongctl:
    default_agent: claude-enterprise
    default_environment: sandbox-vm
    main_worktree: ~/dev/kong/kongctl
    additional_paths:
      - /home/rspurgeon/go
    agent_overrides:
      codex:
        args:
          - --add-dir
          - /home/rspurgeon/.config/kongctl
      claude-personal:
        env:
          CLAUDE_BASH_MAINTAIN_PROJECT_WORKING_DIR: "1"

environments:
  laptop:
    kind: host

  sandbox-vm:
    kind: vm-ssh
    default_runtime: native
    ssh_host: sandbox.internal
    ssh_user: pitch
    ssh_port: 2222
    ssh_options:
      - -o
      - StrictHostKeyChecking=accept-new
    guest_workspace_root: /srv/pitch/workspaces
    shared_paths:
      - host_path: /home/rspurgeon/go
        guest_path: /srv/shared/go
        mode: ro
    bootstrap:
      mise_install: true

agents:
  codex:
    type: codex
    runtime: native
    args:
      - --model
      - gpt-5.4
      - --sandbox
      - workspace-write
      - --ask-for-approval
      - on-request
    env:
      CODEX_HOME: ~/.codex

  claude-enterprise:
    type: claude
    runtime: docker
    args:
      - --model
      - sonnet
      - --permission-mode
      - bypassPermissions
    env:
      CLAUDE_CONFIG_DIR: ~/.claude

  claude-personal:
    type: claude
    runtime: native
    env:
      CLAUDE_CONFIG_DIR: ~/.claude-personal
    args:
      - --model
      - opus

  codex-api:
    type: codex
    runtime: native
    env:
      CODEX_HOME: ~/.codex-api
      OPENAI_API_KEY: ${OPENAI_API_KEY_SECONDARY}

  opencode:
    type: opencode
    runtime: native
    args:
      - --agent
      - build
    env:
      OPENCODE_CONFIG_DIR: ~/.config/opencode
