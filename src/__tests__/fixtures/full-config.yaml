defaults:
  repo: kong/kongctl
  agent: codex
  base_branch: main

repos:
  kong/kongctl:
    main_worktree: ~/dev/kong/kongctl
    worktree_base: ~/.local/share/worktrees/kong/kongctl
    tmux_session: kongctl
    agent_overrides:
      codex:
        args:
          - --add-dir
          - /home/rspurgeon/.config/kongctl
          - --add-dir
          - /home/rspurgeon/go
      claude-personal:
        env:
          CLAUDE_BASH_MAINTAIN_PROJECT_WORKING_DIR: "1"

agents:
  codex:
    runtime: native
    args:
      - --model
      - gpt-5.4
      - --sandbox
      - workspace-write
      - --ask-for-approval
      - on-request
    env:
      CODEX_HOME: ~/.codex

  claude:
    runtime: docker
    args:
      - --model
      - sonnet
      - --permission-mode
      - bypassPermissions
    env:
      CLAUDE_CONFIG_DIR: ~/.claude

agent_profiles:
  claude-personal:
    agent: claude
    runtime: native
    env:
      CLAUDE_CONFIG_DIR: ~/.claude-personal
    args:
      - --model
      - opus

  codex-api:
    agent: codex
    env:
      CODEX_HOME: ~/.codex-api
      OPENAI_API_KEY: ${OPENAI_API_KEY_SECONDARY}
