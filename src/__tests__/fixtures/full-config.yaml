defaults:
  repo: kong/kongctl
  agent: codex
  base_branch: main
  worktree_root: ~/.local/share/worktrees

repos:
  kong/kongctl:
    default_agent: claude-enterprise
    main_worktree: ~/dev/kong/kongctl
    agent_defaults:
      args:
        - --add-dir
        - /home/rspurgeon/go
    agent_overrides:
      codex:
        args:
          - --add-dir
          - /home/rspurgeon/.config/kongctl
      claude-personal:
        env:
          CLAUDE_BASH_MAINTAIN_PROJECT_WORKING_DIR: "1"

agents:
  codex:
    type: codex
    runtime: native
    args:
      - --model
      - gpt-5.4
      - --sandbox
      - workspace-write
      - --ask-for-approval
      - on-request
    env:
      CODEX_HOME: ~/.codex

  claude-enterprise:
    type: claude
    runtime: docker
    args:
      - --model
      - sonnet
      - --permission-mode
      - bypassPermissions
    env:
      CLAUDE_CONFIG_DIR: ~/.claude

  claude-personal:
    type: claude
    runtime: native
    env:
      CLAUDE_CONFIG_DIR: ~/.claude-personal
    args:
      - --model
      - opus

  codex-api:
    type: codex
    runtime: native
    env:
      CODEX_HOME: ~/.codex-api
      OPENAI_API_KEY: ${OPENAI_API_KEY_SECONDARY}
