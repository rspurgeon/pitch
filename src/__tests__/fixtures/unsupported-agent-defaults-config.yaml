defaults:
  repo: kong/kongctl
  agent: codex
  base_branch: main

repos:
  kong/kongctl:
    main_worktree: ~/dev/kong/kongctl
    worktree_base: ~/.local/share/worktrees/kong/kongctl
    tmux_session: kongctl

agents:
  codex:
    runtime: native
    defaults:
      model: gpt-5.4
      sandbox: workspace-write
      ask-for-approval: on-request
    env:
      CODEX_HOME: ~/.codex
