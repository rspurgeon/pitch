defaults:
  repo: kong/kongctl
  agent: missing-agent

repos:
  kong/kongctl:
    default_agent: claude-enterprise
    main_worktree: ~/dev/kong/kongctl
    worktree_base: ~/.local/share/worktrees/kong/kongctl
    tmux_session: kongctl
    agent_overrides:
      codex: {}
      missing-agent: {}

agents:
  codex:
    type: codex
  claude-enterprise:
    type: claude
